<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft One Hour</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="ui">
    <div id="title">Minecraft One Hour</div>
    <div id="crosshair">+</div>
    <div id="info">
      <div id="coords"></div>
      <div id="selectedBlock"></div>
    </div>
    <div id="hotbar">
      <div class="hotbar-slot active">1</div>
      <div class="hotbar-slot">2</div>
      <div class="hotbar-slot">3</div>
      <div class="hotbar-slot">4</div>
      <div class="hotbar-slot">5</div>
      <div class="hotbar-slot">6</div>
    </div>
    <div id="help">Static world preview. Gameplay controls arrive later.</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
